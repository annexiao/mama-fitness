# 护具（护膝/登山杖）和 配件（瑜伽垫/跑步鞋）：说明页，没有动作
info:
  # -------- 护具 --------
  - id: knee-brace
    name: 护膝
    emoji: 🦵
    group: 护具
    when_to_use:
      - 上楼下楼、膝盖有点酸的时候
      - 长时间走路、爬山或站立之前
      - 做腿部运动时，给膝盖多一层稳定
    how_to_choose: 松紧以能塞进一根手指为宜，别勒太紧影响血流。
    caution: 护膝是辅助，不是替代。真正保护膝盖的，是练强腿部和臀部的肌肉。别因为有护膝就不练腿。

  - id: trekking-poles
    name: 登山杖
    emoji: 🥾
    group: 护具
    when_to_use:
      - 走远路、走不平的路
      - 下坡的时候（下坡最伤膝盖，杖能帮你分担）
      - 需要多一点平衡和支撑的时候
    how_to_choose: 站直手握把手时，小臂和地面大致平行为合适高度。下坡可以调长一点。
    caution: 两根一起用最稳。落地时先杖后脚，让杖帮你分担体重，膝盖会轻松很多。

  # -------- 配件 --------
  - id: yoga-mat
    name: 瑜伽垫
    emoji: 🧘
    group: 配件
    notes:
      - 做地面动作（臀桥、拉伸、夹球）时铺上，护住膝盖、后背和手腕
      - 特地选了厚的，垫着不硌、更舒服
      - 主要作用是防滑，脚和手不打滑，动作才做得稳、才安全

  - id: running-shoes
    name: 跑步鞋
    emoji: 👟
    group: 配件
    notes:
      - 走路、快走、上椭圆机时穿，好鞋帮你稳住每一步、护住膝盖和脚踝
      - 鞋的形状和性能对上了年纪的人特别重要，一双合脚的好鞋能少很多膝盖和脚的问题
    how_to_choose: 鞋子是消耗品，鞋底磨平、变硬、支撑变差了就要换，不要舍不得。旧鞋撑不住脚，反而伤膝盖。
    caution: 走路多的话，大概半年到一年看一次鞋底，该换就换。

  - id: foam-roller
    name: 泡沫轴
    emoji: 🧘
    group: 配件
    when_to_use:
      - 做完力量训练之后用它放松、拉伸，帮助身体恢复
      - 恢复得好，肌肉才长得好：拉伸放松和练力量是一套的，两方面都别落下
      - 平时觉得肌肉酸紧的时候也可以用
    notes:
      - 用身体压着它慢慢滚，放松紧张酸胀的肌肉（大腿、小腿、后背等）
      - 滚到酸胀的点可以多停一会，慢慢呼吸，不用急着滚过去
    caution: 别直接压在骨头、膝盖、腰椎（下背的脊柱）上。有骨质疏松或者急性疼痛，先问医生。
    videos:
      - https://www.bilibili.com/video/BV1hNsczPE5D/
      - https://www.bilibili.com/video/BV1Xs97BqEsQ/

  - id: foot-mat
    name: 足底按摩垫
    emoji: 👣
    group: 配件
    why: |
      脚底看着不起眼，其实是全身的「地基」。脚、脚踝、小腿是连在一起的一条线，脚底的筋（筋膜）如果太紧，脚踝就不灵活，蹲下、上下楼梯的时候，膝盖容易多受力。

      平时踩一踩、滚一滚脚底，把这条筋放松开，好处是连着来的：脚踝更灵活，走路和下蹲更顺，膝盖前面（膝盖骨周围）的压力也能小一点，久站久走之后脚底没那么累、没那么紧。

      不过也说句实话：如果膝盖的疼是别的原因（比如半月板、韧带、比较重的骨关节炎，或者臀腿力量不够），光按脚底帮助就有限了。它是个好帮手，能让下肢更舒服，但真正护住膝盖的，还是把臀腿的力量练起来。想效果更好，可以踩完脚底，再顺手拉伸一下小腿、活动活动脚踝。
    notes:
      - 光脚站上去，或者原地轻轻踩一踩，按摩脚底、促进血液循环
      - 顺便还能练平衡
      - 一定扶着桌子或墙，一次踩 2 到 3 分钟就够，最多别超过 5 分钟；时间从短到长慢慢加，别一上来就站太久
    caution: 踩太久容易把脚底的筋（筋膜）弄发炎，酸胀是正常、一有刺痛就停、隔天再踩。踩着太硌可以垫一层薄袜子。

  - id: foot-roller
    name: 足底按摩滚轮
    emoji: 🦶
    group: 配件
    why: |
      脚底看着不起眼，其实是全身的「地基」。脚、脚踝、小腿是连在一起的一条线，脚底的筋（筋膜）如果太紧，脚踝就不灵活，蹲下、上下楼梯的时候，膝盖容易多受力。

      平时滚一滚、踩一踩脚底，把这条筋放松开，好处是连着来的：脚踝更灵活，走路和下蹲更顺，膝盖前面（膝盖骨周围）的压力也能小一点，久站久走之后脚底没那么累、没那么紧。

      不过也说句实话：如果膝盖的疼是别的原因（比如半月板、韧带、比较重的骨关节炎，或者臀腿力量不够），光按脚底帮助就有限了。它是个好帮手，能让下肢更舒服，但真正护住膝盖的，还是把臀腿的力量练起来。想效果更好，可以滚完脚底，再顺手拉伸一下小腿、活动活动脚踝。
    notes:
      - 坐着的时候把脚踩在滚轮上，前后滚动
      - 放松脚底和足弓的筋膜，缓解久站久走后脚底的疲劳和紧绷
      - 力度以自己觉得舒服为准，不用使劲压
