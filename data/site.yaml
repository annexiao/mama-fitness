# /why 页那封完整的信
letter: |
  妈妈，我爱你。

  我希望你能年轻很多很多年，
  还能陪我去很多很多地方。

  所以让我们一起，把身体照顾好。

  我不能总在你身边，
  但只要打开这里，你就能自己一步一步来，
  知道每样器械怎么用、每个动作练到哪里、什么时候该停。

