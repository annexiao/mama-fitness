# 知识分组（可无限加分组：每组 key/label/icon + articles）
knowledge:
  - key: training
    label: 训练知识
    icon: 🏋️
    articles:
      - id: weight-and-feel
        title: 怎么判断重量和阻力合不合适
        body: |
          每个动作先按 12 到 15 次来试。做到最后 2 到 3 次觉得有点吃力，但动作还稳、不憋气，这个重量就刚刚好。

          如果 8 次左右就撑不住，说明太重了，弹力带可以站近一点，或者换薄一点的。要是做到 20 次还很轻松，说明太轻了，可以站远一点，或者换粗一点的。

          记住，动作做标准，比重量大更重要。
      - id: reps-and-effect
        title: 次数不同，练的东西也不同
        body: |
          我们主要练 6 到 12 次会有点吃力的重量，这样更长力气，肌肉也会更结实。

          15 到 20 次比较轻松的练法也很好，主要练耐力，让关节更稳。

          那种只能做 1 到 5 次的大重量，我们不练，没必要，也更容易受伤。
      - id: breathe-and-warmup
        title: 呼吸和热身
        body: |
          做动作的时候记住一句话：用力时呼气，放松时吸气，千万别憋气。

          每次练之前，先原地踏步，或者活动肩膀、膝盖、脚踝 2 到 3 分钟，让身体热起来再开始。

          练完再慢慢拉伸一下，身体会舒服很多，第二天也不容易僵。
      - id: frequency-rest-sleep
        title: 频率、休息和睡眠一样重要
        body: |
          同一个部位不用天天练。一周练 2 到 3 次，中间隔一两天休息，效果反而更好。

          练完以后，肌肉会在休息的时候慢慢修复、变结实。睡觉也很重要，睡不好、太累的时候硬练，反而容易受伤。

          椭圆机、快走这种有氧可以多一点，一周 3 到 4 次。哪天累了、没睡好、身体不舒服，就休息。能长期坚持，比一两天拼命更重要。
      - id: stretch-and-recover
        title: 练完拉伸放松，恢复更好
        body: |
          力量练完以后，别马上停下来。花几分钟拉伸一下，或者用泡沫轴轻轻滚一滚，身体会舒服很多。

          拉伸主要是帮紧张的肌肉放松、让关节活动更顺，第二天不那么僵、不那么累。恢复得好，下一次才练得动、才有进步，所以放松和练力量是一套的，别落下。

          怎么做：练到哪个部位，就慢慢拉那个部位，每个动作停 20 到 30 秒。泡沫轴滚到酸胀的地方就慢一点，别用蛮力，边滚边慢慢呼吸。（泡沫轴怎么用，看「器械 · 泡沫轴」页里的讲解视频。）

  - key: bloodsugar
    label: 运动与血糖
    icon: 🩸
    articles:
      - id: exercise-lowers-sugar
        title: 运动帮血糖更平稳
        body: |
          运动对血糖很有帮助。肌肉一动起来，就会用掉一部分血液里的糖，所以饭后走一走、练一练，血糖通常会更平稳。

          肌肉越结实，身体处理糖的能力也会更好。我们练力量，不只是为了有劲，也是为了把血糖照顾好。
      - id: muscle-insulin-resistance
        title: 肌肉多，胰岛素更管用
        body: |
          血糖高，有时候是因为身体对胰岛素没那么敏感，血里的糖不容易进到细胞里被用掉。

          肌肉就是身体里帮忙存糖、用糖最大的地方。肌肉少了，能帮忙的地方就少了，血糖就更难管；把肌肉练结实，等于给身体多修了些"存糖、用糖的仓库"，胰岛素也更好使。

          所以练力量很值得坚持。坚持几个月，很多人的血糖和糖化血红蛋白都会慢慢往好里走。
      - id: after-meal-walk
        title: 饭后动一动，血糖更平稳
        body: |
          饭后血糖最容易往上升。吃完饭不用马上剧烈运动，休息一会儿，过半小时到一小时去散散步就很好。

          走 10 到 15 分钟，或者轻松踩一会儿椭圆机，都能帮这一餐的血糖更平稳。重点不是走多快，是别一直坐着。
      - id: strength-and-sugar
        title: 力量训练的"后劲"
        body: |
          力量训练的好处不只在练的那一会儿。练完以后，肌肉接下来一两天还会更愿意用血糖来恢复自己。

          所以一周练 2 到 3 次力量，对血糖是长期有帮助的。慢慢练、规律练，比偶尔猛练更管用。
      - id: sugar-safety
        title: 血糖相关的安全提醒
        body: |
          如果在吃降糖药，或者以后有打胰岛素，运动前后就要更留意低血糖。出门运动可以随身带一点糖、饼干，心里踏实。

          万一出现心慌、手抖、出冷汗、头晕，就先停下来，坐下休息，补一点糖分。

          具体药怎么配合运动，还是听医生的，别自己硬改。

  - key: nutrition
    label: 饮食知识
    icon: 🥗
    articles:
      - id: enough-protein
        title: 蛋白质要吃够
        body: |
          年纪大了肌肉更容易流失，蛋白质要吃够，练力量才更容易有效果。

          不用只靠晚饭补，每一餐都放一点。鸡蛋、牛奶、鱼虾、豆腐豆浆、鸡肉、瘦肉，都很好。

          大概可以按每天每公斤体重 1 到 1.2 克来估。先尽量从饭里吃够，吃得够就不用另外买蛋白粉。
      - id: calcium-vitd
        title: 钙和维生素 D
        body: |
          钙和维生素 D 是护骨头的。骨头结实一点，万一摔倒，受伤的风险也会低一些。

          牛奶、豆制品、深绿色蔬菜里都有钙。天气好时晒晒太阳，也能帮身体合成维生素 D。

          不过防摔最直接的还是练力量和练平衡；吃得够、晒点太阳、加上锻炼一起来，比只靠补钙更稳妥。
      - id: hydration
        title: 喝够水
        body: |
          喝水也算训练的一部分。肌肉发力、关节活动、身体散热，都需要水。

          不用一次喝很多，运动前后各喝一点，练的时候也小口喝，别等到很渴了才想起来。
      - id: supplements
        title: 补剂：了解一下就好
        body: |
          补剂不是必须的，不吃完全没问题。把饭吃好、蛋白质吃够、睡好、规律练，比什么补剂都强。下面这两样只是万一哪天想了解，写在这儿。

          镁：一种帮肌肉放松的矿物质。有研究发现，运动后要是肌肉有点酸，补一点镁可能帮着缓解一些（效果不算很强，本来缺镁的人会更明显），对睡眠也有一点点小帮助。真想试，运动后或睡前吃一点点，从小量开始就行。

          肌酸：如果想让锻炼更有劲、恢复更快，可以了解一下它。它像给肌肉充一块"小电池"，每天一小勺（3 到 5 克），天天吃比挑时间更重要，记得多喝水。

          这两样都不勉强。要是在吃药、或者有肾脏方面的情况，试之前先问问医生。
