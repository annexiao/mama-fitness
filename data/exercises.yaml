# 起手动作（起始版本，之后和妈妈一起打磨、配 GIF 和 YouTube）
# body_part: 臀腿 | 核心腰 | 手臂 | 胸背 | 肩颈 | 全身
# intensity: 轻松 | 中等 | 加把劲    aspects(多选): 力量 | 柔韧性 | 稳定性
exercises:

  # ---------- 弹力圈 loop-band（按妈妈定的优先级排序）----------
  # 第一优先 ★★★★★
  - id: clamshell
    tool: loop-band
    name: 蚌壳式
    body_part: 臀腿
    intensity: 轻松
    aspects: [稳定性, 力量]
    minutes: 3
    sets: 2 组 × 每边 12 到 15 次
    target: 臀中肌
    muscles: [gluteal]
    gif: /static/gif/clamshell.gif
    gif_source: "https://www.youtube.com/watch?v=39t1SisyGQg  6-10s"
    video: https://www.bilibili.com/video/BV1gU4y1p7UC/
    why: 稳定骨盆、保护膝盖、改善走路姿势。很温和，特别适合当热身，或者膝盖不太舒服的日子。
    science_tip: 像贝壳张开一样打开上面那条腿的膝盖，两只脚跟并拢不动，感受屁股外侧在发力。
    dos: [侧躺屈膝, 弹力圈套在膝盖上方, 慢慢打开再收回]
    donts: [别让身体往后倒, 别靠晃动借力, 别耸肩缩脖子]
    self_check:
      - {where: 臀部外侧, symptom: 发酸, verdict: ok}
      - {where: 腰, symptom: 疼, verdict: check}

  - id: lateral-walk
    tool: loop-band
    name: 螃蟹步
    body_part: 臀腿
    intensity: 中等
    aspects: [力量, 稳定性]
    minutes: 4
    sets: 2 组 × 每边 10 到 12 步
    target: 臀中肌 + 臀小肌
    muscles: [gluteal]
    gif: /static/gif/lateral-walk.gif
    gif_source: "https://www.youtube.com/shorts/et5EY0KDsGQ  2-6s"
    why: 防止膝盖往里扣，让走路和爬楼梯更轻松、更稳。
    science_tip: 微微屈膝半蹲，一步一步有控制地横着走，全程膝盖对着脚尖、别被弹力圈拉得内扣。
    dos: [弹力圈套在膝盖上方, 微微屈膝半蹲, 背挺直横着走]
    donts: [别塌腰, 膝盖别往里扣, 别把腿甩来甩去]
    self_check:
      - {where: 臀部外侧, symptom: 发酸, verdict: ok}
      - {where: 膝盖, symptom: 疼痛, verdict: stop}
      - {where: 腰, symptom: 酸痛, verdict: check}

  - id: sit-to-stand
    tool: loop-band
    name: 坐站（从椅子起身）
    body_part: 臀腿
    intensity: 中等
    aspects: [力量, 稳定性]
    minutes: 4
    sets: 2 组 × 10 到 12 次
    target: 股四头肌 + 臀大肌
    muscles: [quadriceps, gluteal]
    gif: /static/gif/sit-to-stand.gif
    gif_source: "https://www.youtube.com/shorts/P4rD8EZuKQI  5-11s"
    why: 练大腿和臀部的力量，还有平衡。从椅子上稳稳站起来，是上了年纪最实用、最该练的动作之一。
    science_tip: 从椅子上站起来、再慢慢坐下。累的话可以先扶一下；能不用手就尽量不用手，效果更好。
    dos: [弹力圈套在膝盖上方, 坐在椅子前半段, 挺胸用腿和臀站起来]
    donts: [膝盖别内扣, 别猛地弹起来, 坐下时别一下砸到椅子上]
    self_check:
      - {where: 大腿和屁股, symptom: 发酸, verdict: ok}
      - {where: 膝盖, symptom: 疼痛, verdict: stop}

  - id: glute-bridge
    tool: loop-band
    name: 臀桥
    body_part: 臀腿
    intensity: 中等
    aspects: [力量, 稳定性]
    minutes: 4
    sets: 2 组 × 12 到 15 次
    target: 臀大肌 + 臀中肌
    muscles: [gluteal]
    why: 练臀部力量，保护腰和膝盖，让起身、上楼更有劲。
    science_tip: 桥顶到最高时，轻轻把两个膝盖往外推、顶着弹力圈，能更好地练到臀中肌。
    dos: [平躺屈膝, 弹力圈套在膝盖上方, 用臀把髋顶高、膝盖轻轻外推]
    donts: [别用腰硬顶, 别憋气, 别塌着膝盖内扣]
    gif: /static/gif/glute-bridge.gif
    gif_source: "https://www.youtube.com/shorts/XZUaJezpCGM  1-3s (上下有广告，裁掉)"
    video: https://www.youtube.com/watch?v=HeAkXWob2UU
    self_check:
      - {where: 屁股, symptom: 发酸发热, verdict: ok}
      - {where: 腰, symptom: 顶起来时疼, verdict: check}

  - id: standing-hip-abduction
    tool: loop-band
    name: 卧姿侧抬腿
    body_part: 臀腿
    intensity: 轻松
    aspects: [稳定性, 力量]
    minutes: 3
    sets: 2 组 × 每边 10 到 12 次
    target: 臀中肌
    muscles: [gluteal]
    why: 侧躺着把上面那条腿往上抬，专门练臀部外侧的稳定肌。髋稳了，走路、上下楼、单脚站立都更稳当，也更护膝护腰。
    science_tip: 侧躺时身体摆成一条直线，用臀部外侧的力量把腿抬起，别靠腰或身体后仰去带。抬到臀部外侧明显发力就够了，慢起慢落比抬高更重要。
    dos: [侧躺身体成一条直线, 弹力圈套在膝盖上方, 用臀部外侧慢慢把上面的腿抬起再放下]
    donts: [别靠腰或身体后仰去带腿, 别抬太快, 别让骨盆往后倒]
    gif: /static/gif/side-leg-raise.gif
    gif_source: "https://www.youtube.com/watch?v=3w0cmENyeAw  82-87s"
    video: https://www.youtube.com/watch?v=3w0cmENyeAw
    self_check:
      - {where: 臀部外侧, symptom: 发酸发热, verdict: ok}
      - {where: 腰, symptom: 疼, verdict: check}

  # 第二优先 ★★★★☆
  - id: monster-walk
    tool: loop-band
    name: 怪兽走
    body_part: 臀腿
    intensity: 中等
    aspects: [力量, 稳定性]
    minutes: 4
    sets: 2 组 × 向前斜走 10 步
    target: 臀中肌 + 臀大肌
    muscles: [gluteal]
    why: 臀部全程持续发力，练走路的稳定和力量，非常适合出门旅游、要走很多路之前练。
    science_tip: 微微屈膝，向前斜着一步一步走（像螃蟹往前挪），全程保持弹力圈是绷紧的、膝盖别内扣。
    dos: [弹力圈套在膝盖上方, 微微屈膝, 向前斜着走保持圈绷紧]
    donts: [别站太直让圈松掉, 膝盖别内扣, 别塌腰]
    gif: /static/gif/monster-walk.gif
    video: https://www.youtube.com/watch?v=kfm8QOPfD9k
    self_check:
      - {where: 臀部, symptom: 发酸发热, verdict: ok}
      - {where: 膝盖, symptom: 疼痛, verdict: stop}

  - id: mini-squat
    tool: loop-band
    name: 浅蹲
    body_part: 臀腿
    intensity: 轻松
    aspects: [力量, 稳定性]
    minutes: 3
    sets: 2 组 × 10 到 12 次
    target: 大腿 + 臀
    muscles: [quadriceps, gluteal]
    why: 温和地练腿和臀，蹲得浅、更安全，适合刚开始练。
    science_tip: 只蹲一点点（浅蹲）就行，不用蹲太低；膝盖对着脚尖方向，扶着东西会更稳。
    dos: [弹力圈套在膝盖上方, 脚与肩同宽, 浅浅下蹲再站起]
    donts: [别蹲太低, 膝盖别内扣, 别塌腰弓背]
    gif: /static/gif/mini-squat.gif
    video: https://www.youtube.com/watch?v=o1T4XRv1FU4
    self_check:
      - {where: 大腿和屁股, symptom: 发酸, verdict: ok}
      - {where: 膝盖, symptom: 疼痛, verdict: stop}

  - id: fire-hydrant
    tool: loop-band
    name: 消防栓式（四点跪姿开髋）
    body_part: 臀腿
    intensity: 轻松
    aspects: [力量, 稳定性]
    minutes: 3
    sets: 2 组 × 每边 12 次
    target: 臀中肌
    muscles: [gluteal]
    why: 练臀中肌，让骨盆和膝盖更稳。膝盖舒服的日子做；跪着不舒服就跳过、换别的动作。
    science_tip: 四点跪姿（手和膝盖撑地），把一条腿像小狗抬腿一样往外侧抬开，上身别跟着歪。
    dos: [四点跪姿手膝撑地, 弹力圈套在膝盖上方, 一条腿侧向抬开]
    donts: [别塌腰, 别用身体转动去带腿, 膝盖跪着疼就别做]
    gif: /static/gif/fire-hydrant.gif
    gif_source: "https://www.youtube.com/shorts/9AGHLxZ049c  6-8s"
    video: https://www.youtube.com/shorts/9AGHLxZ049c
    self_check:
      - {where: 臀部外侧, symptom: 发酸, verdict: ok}
      - {where: 膝盖, symptom: 跪着疼, verdict: stop}
      - {where: 腰, symptom: 疼, verdict: check}

  - id: standing-march
    tool: loop-band
    name: 原地高抬腿
    body_part: 臀腿
    intensity: 轻松
    aspects: [稳定性, 力量]
    minutes: 3
    sets: 2 组 × 每边 12 次
    target: 屈髋肌 + 核心 + 平衡
    muscles: [quadriceps, abs]
    why: 提高走路能力和平衡，练"抬腿迈步"的稳定，走路更有力、更不容易绊倒。
    science_tip: 弹力圈绑在两只脚上，扶着东西，原地一条腿一条腿地抬高（像踏步），站稳了再换腿。
    dos: [弹力圈绑在两只脚上, 扶稳桌子或墙, 原地交替把腿抬高]
    donts: [别驼背, 别为了抬高把腰带歪, 站不稳就扶紧]
    gif: /static/gif/standing-march.gif
    gif_source: "https://www.youtube.com/shorts/87WwFpe_-hI  3-6s"
    self_check:
      - {where: 大腿根和核心, symptom: 发酸, verdict: ok}
      - {where: 腰, symptom: 疼, verdict: check}

  # ---------- 普拉提小球 pilates-ball ----------
  - id: ball-bridge
    tool: pilates-ball
    name: 夹球单腿臀桥
    body_part: 臀腿
    intensity: 加把劲
    aspects: [力量, 稳定性]
    minutes: 4
    sets: 2 组 × 每边 10 次
    target: 臀大肌 + 核心
    muscles: [gluteal, abs]
    why: 比双腿臀桥更进阶：小球垫在髋下，一条腿撑地顶髋、另一条腿伸直抬起，专门练单侧臀部和核心的稳定。和弹力圈臀桥区分开，练的是"单腿也稳得住"的能力。
    science_tip: 小球垫在髋（骶骨）下当支撑，一条腿踩稳、把髋顶住别塌，另一条腿慢慢伸直抬起再放下，全程骨盆别左右歪。
    dos: [小球垫在髋下, 一条腿踩稳顶住髋, 另一条腿慢慢伸直抬起]
    donts: [别塌腰, 别让骨盆左右歪, 抬腿别乱甩]
    gif: /static/gif/ball-bridge.gif
    video: https://www.youtube.com/watch?v=VhMjT8CD8w0
    self_check:
      - {where: 屁股和核心, symptom: 发酸, verdict: ok}
      - {where: 腰, symptom: 疼, verdict: check}

  - id: wall-ball-squat
    tool: pilates-ball
    name: 靠墙夹球深蹲
    body_part: 臀腿
    intensity: 中等
    aspects: [力量, 稳定性]
    minutes: 4
    sets: 2 组 × 12 次
    target: 大腿 + 臀
    muscles: [quadriceps, gluteal]
    why: 靠墙更安全，膝间夹着小球下蹲，一边练腿的力量、一边练大腿内侧夹紧，让蹲下起身、上下楼都更有底气。
    science_tip: 后背靠墙，膝盖之间夹住小球别让它掉，慢慢蹲到大腿快平就行，不用太深，膝盖对着脚尖方向。
    dos: [后背靠墙站稳, 膝盖之间夹住小球, 慢慢下蹲再起]
    donts: [别蹲到膝盖疼的深度, 别膝盖内扣把球挤掉, 别塌腰]
    gif: /static/gif/wall-ball-squat.gif
    gif_source: "https://www.youtube.com/shorts/uKW28Y3fbGc  7-12s"
    self_check:
      - {where: 大腿, symptom: 发酸, verdict: ok}
      - {where: 膝盖, symptom: 疼痛, verdict: stop}

  - id: seated-squeeze
    tool: pilates-ball
    name: 坐姿夹球
    body_part: 核心腰
    intensity: 轻松
    aspects: [稳定性, 力量]
    minutes: 3
    sets: 2 组 × 15 次
    target: 盆底肌 + 大腿内侧
    muscles: [adductors]
    why: 很温和，坐着就能练盆底肌和核心，对久坐、腰没劲很有帮助。
    science_tip: 夹的时候慢慢收紧、停两秒再放松，配合呼气用力。
    dos: [坐正, 膝间夹球, 慢慢夹紧再松开]
    donts: [别憋气猛夹, 别驼背]
    gif: /static/gif/seated-squeeze.gif
    gif_source: "https://www.youtube.com/shorts/mm87AHBg69g  6-7.5s"
    video: https://www.youtube.com/shorts/ctuoGJQDBcI
    self_check:
      - {where: 大腿内侧, symptom: 发酸, verdict: ok}

  # ---------- 弹力带 resistance-band（按妈妈定的优先级排序）----------
  # 第一优先 ★★★★★
  - id: band-row
    tool: resistance-band
    name: 弹力带划船
    body_part: 胸背
    intensity: 中等
    aspects: [力量]
    minutes: 4
    sets: 2 组 × 12 到 15 次
    target: 背阔肌 + 菱形肌 + 后肩
    muscles: [upper-back, deltoids]
    why: 划船是最能改善圆肩驼背的动作之一，练好背部力量，以后抱孙子、拎东西都更轻松，站得更挺。
    science_tip: 拉的时候先把两块肩胛骨往中间收紧，再用手肘带动往后拉，想着用背发力，不是用手臂。
    band: 粗一点的那条（练力量）
    dos: [坐直或站稳，弹力带固定在前方（比如门把手上）, 手臂微屈往后拉肘, 感受两侧肩胛骨往中间收]
    donts: [别耸肩, 别弓背前倾借力, 别拉到手臂完全伸直再放松]
    gif: /static/gif/seated-row.gif
    gif_source: "https://www.youtube.com/watch?v=whSXi-EXbqI  18-21s"
    video: https://www.youtube.com/watch?v=whSXi-EXbqI
    self_check:
      - {where: 后背和后肩, symptom: 发酸, verdict: ok}
      - {where: 脖子和肩膀, symptom: 紧绷发酸, verdict: check}
      - {where: 下背, symptom: 刺痛, verdict: stop}

  - id: band-face-pull
    tool: resistance-band
    name: 弹力带面拉
    body_part: 肩颈
    intensity: 中等
    aspects: [力量]
    minutes: 3
    sets: 2 组 × 15 次
    target: 后束三角肌 + 菱形肌 + 下斜方肌 + 肩袖
    muscles: [deltoids, upper-back, trapezius]
    why: 专门练肩膀后侧和肩胛周围的小肌肉，几乎人人都该练一练，能明显改善圆肩、缓解肩颈酸痛。
    science_tip: 固定点略高于头，往脸的方向拉，拉的时候手肘打开、往两侧后方带，想象把耳朵后面的空气抓住。
    band: 薄一点的那条（更轻）
    dos: [弹力带固定在略高于头的位置, 双手握住带子往脸的方向拉, 拉开时手肘朝外打开]
    donts: [别耸肩, 别用腰往后仰借力, 别拉得太快]
    gif: /static/gif/face-pull.gif
    gif_source: "https://www.youtube.com/watch?v=uX5W2kynMIo  121-126s"
    video: https://www.youtube.com/watch?v=uX5W2kynMIo
    self_check:
      - {where: 肩后和上背, symptom: 发酸, verdict: ok}
      - {where: 脖子, symptom: 紧绷, verdict: check}
      - {where: 肩膀, symptom: 刺痛, verdict: stop}

  - id: band-chest-press
    tool: resistance-band
    name: 弹力带推胸
    body_part: 胸背
    intensity: 中等
    aspects: [力量]
    minutes: 3
    sets: 2 组 × 12 次
    target: 胸 + 三头肌
    muscles: [chest, triceps]
    why: 练胸和手臂前侧的力量，推门、从地上抱起东西再站起来都会更有劲。
    science_tip: 双手推到手臂快伸直就好，不用完全锁死手肘，推的时候呼气、收的时候吸气。
    band: 粗一点的那条（练力量）
    dos: [固定在门上, 面朝反方向站稳, 双手向前平推再慢慢收回]
    donts: [别耸肩, 别猛地推出去, 别憋气]
    gif: /static/gif/chest-press.gif
    gif_source: "https://www.youtube.com/shorts/T0UJ0W-_yIE  1-4s"
    video: https://www.youtube.com/shorts/T0UJ0W-_yIE
    self_check:
      - {where: 胸和手臂, symptom: 发酸, verdict: ok}
      - {where: 肩膀, symptom: 刺痛, verdict: stop}

  - id: band-lat-pulldown
    tool: resistance-band
    name: 高位下拉
    body_part: 胸背
    intensity: 中等
    aspects: [力量]
    minutes: 4
    sets: 2 组 × 12 次
    target: 背阔肌
    muscles: [upper-back]
    why: 模拟从高处往下拉的动作，专门练背阔肌，能改善姿势，也让拉、拽东西的能力变强。
    science_tip: 拉下来的时候想着用手肘往下往后带，而不是只用手抓，感受后背在用力而不是手臂。
    band: 粗一点的那条（练力量）
    dos: [固定在高处, 双手握住带子两端, 手肘往下往后拉到胸前]
    donts: [别用身体后仰借力, 别耸肩, 别拉得太快没有控制]
    gif: /static/gif/lat-pulldown.gif
    gif_source: "https://www.youtube.com/shorts/RMqMUiHW5eQ  1-4s"
    video: https://www.youtube.com/shorts/RMqMUiHW5eQ
    self_check:
      - {where: 后背, symptom: 发酸, verdict: ok}
      - {where: 脖子肩膀, symptom: 紧绷, verdict: check}

  - id: band-pallof-press
    tool: resistance-band
    name: 抗旋转
    body_part: 核心腰
    intensity: 中等
    aspects: [力量, 稳定性]
    minutes: 3
    sets: 2 组 × 每边 10 到 12 次
    target: 核心（腹斜肌为主）
    muscles: [abs, obliques]
    why: 这个动作专门保护腰，还能提高平衡感、预防跌倒，是特别推荐的一个核心动作。
